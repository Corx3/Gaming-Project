<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Get in touch with Game Stop – We are here to assist you and answer all your gaming queries 24/7."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <title>Contact Us – Game Stop</title>
  </head>

  <body>
    <div class="mainNavigationWrapper">
      <div class="navContentBoundary">
        <a href="index.html" class="brandBrandmark">
          <img src="images/loogoo.svg" alt="Game Stop Logo" />
        </a>
        <button
          class="mobileMenuTrigger"
          id="triggerMobileNav"
          aria-label="Toggle navigation"
        >
          &#9776;
        </button>
        <nav class="navigationLinkList" id="navigationLinkList">
          <a href="index.html">Home</a>
          <a href="index.html#showcaseSection">Our Shop</a>
          <a href="index.html#engagementSection">Product Details</a>
          <a href="contact.html" class="currentActiveItem">Contact Us</a>
          <button class="globalActionButton" id="openAuthPortal">Sign In</button>
        </nav>
      </div>
    </div>

    <div class="informationalHeroHeader">
      <h1 class="informationalTitle">Get In <i>Touch</i></h1>
      <p class="informationalSubtitle">Have a question or feedback? We would <i>love</i> to hear from you.</p>
    </div>

    <div class="formSubmissionBoundary">
      <form id="feedbackDataForm" novalidate>
        <h2 class="formBoxTitle">Send Us a <i>Message</i></h2>

        <label class="formInputLabel" for="visitorFullName">Name</label>
        <input class="formInteractiveField" type="text" id="visitorFullName" placeholder="Your full name" />

        <label class="formInputLabel" for="visitorEmailAddress">Email</label>
        <input class="formInteractiveField" type="email" id="visitorEmailAddress" placeholder="your@email.com" />

        <label class="formInputLabel" for="visitorNumericalAge">Age</label>
        <input
          class="formInteractiveField"
          type="number"
          id="visitorNumericalAge"
          placeholder="Your age"
          min="1"
          max="120"
        />

        <label class="formInputLabel" for="visitorTextPayload">Message</label>
        <textarea
          class="formInteractiveField formTextareaHeight"
          id="visitorTextPayload"
          name="question"
          cols="30"
          rows="5"
          placeholder="Write your message here…"
        ></textarea>

        <p id="submissionFeedbackLine" class="submissionFeedbackLine"></p>

        <button type="button" class="globalActionButton" id="triggerFormDispatch">Send Message</button>
      </form>
    </div>

    <div class="siteFooterWrapper">
      <div class="siteFooterContent">
        Copyright &copy; <span id="copyrightCurrentYear"></span> <i>Game Stop</i> Store. All rights reserved.
      </div>
    </div>

    <div class="authModalBackdrop" id="authPortalOverlay">
      <div class="authModalCard">
        <button class="authModalDismiss" id="closeAuthPortal">&times;</button>
        <h2 class="authModalTitle">Sign <i>In</i></h2>
        <input type="text" id="authUsernameInput" placeholder="Username" />
        <input type="password" id="authPasswordInput" placeholder="Password" />
        <p id="authValidationMessage" class="authValidationMessage"></p>
        <button class="globalActionButton" id="submitAuthCredentials">Login</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
